name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.1.1

    - name: Setup Java
      uses: actions/setup-java@v4.1.0
      with:
        distribution: 'temurin'
        java-version: '17'
   
    - name: Build Jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3.0.0
      with: 
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:1.0.0 .

    - name: Push Image to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:1.0.0

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop hello-app || true
          docker rm hello-app || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:1.0.0
          docker run -d --name hello-app -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/hello-app:1.0.0

    
    
      
