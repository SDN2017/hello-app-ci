name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.1.1

    - name: Setup Java
      uses: actions/setup-java@v4.1.0
      with:
        distribution: 'temurin'
        java-version: '17'
   
    - name: Build Jar
      run: mvn clean package -DskipTests

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ECR_REPOSITORY_URI }}:1.0.0 .

    - name: Push Docker Image to ECR
      run: |
        docker push ${{ secrets.ECR_REPOSITORY_URI }}:1.0.0

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker stop hello-app || true
          sudo docker rm hello-app || true
          sudo docker pull ${{ secrets.ECR_REPOSITORY_URI }}:1.0.0
          sudo docker run -d --name hello-app -p 8080:8080 ${{ secrets.ECR_REPOSITORY_URI }}:1.0.0




